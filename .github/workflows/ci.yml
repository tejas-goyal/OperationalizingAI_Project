name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest
          pip install fastapi uvicorn xgboost scikit-learn numpy pandas \
                      prometheus-fastapi-instrumentator pydantic httpx

      - name: Lint with ruff
        run: ruff check api/ tests/ scripts/ --select E,W,F --ignore E501

      - name: Check formatting with black
        run: black --check api/ tests/ scripts/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t crypto-api:ci .

      - name: Smoke test container
        run: |
          docker run -d --name smoke-test -p 8000:8000 crypto-api:ci
          sleep 5
          curl -f http://localhost:8000/health
          docker stop smoke-test
