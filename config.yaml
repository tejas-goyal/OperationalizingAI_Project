kafka:
  bootstrap_servers: "localhost:9092"
  topics:
    raw: "ticks.raw"
    features: "ticks.features"

coinbase:
  ws_url: "wss://advanced-trade-ws.coinbase.com"
  pairs:
    - "BTC-USD"
    - "ETH-USD"

ingestion:
  duration_minutes: 60

model:
  variant: "ml"           
  artifacts_dir: "models/artifacts"

api:
  host: "0.0.0.0"
  port: 8000

monitoring:
  scrape_interval: "15s"
  drift_threshold: 0.5 
